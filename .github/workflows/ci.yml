name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-22.04
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        include:
          - mediawiki_version: '1.39'
            php_version: 8.1
            database_type: mysql
            database_image: "mysql:8"
            coverage: false
            experimental: false
          - mediawiki_version: '1.43'
            php_version: 8.2
            database_type: mysql
            database_image: "mysql:8"
            coverage: true
            experimental: false
          - mediawiki_version: '1.44'
            php_version: 8.3
            database_type: mysql
            database_image: "mysql:8"
            coverage: false
            experimental: false

    env:
      MW_VERSION: ${{ matrix.mediawiki_version }}
      PHP_VERSION: ${{ matrix.php_version }}
      DB_TYPE: ${{ matrix.database_type }}
      DB_IMAGE: ${{ matrix.database_image }}
      NODE_JS: ${{ matrix.coverage && 'true' || '' }}

      
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
                   
      - name: Update submodules
        run: git submodule update --init --remote
  
      - name: Run tests
        run: make ci
        if: matrix.coverage == false

      - name: Run Phan static analysis
        run: make install composer-phan
        if: matrix.coverage == true

      - name: Run tests with coverage
        run: make ci-coverage
        if: matrix.coverage == true

      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/coverage/php/coverage.xml
        if: matrix.coverage == true